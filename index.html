<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P4P — Pi Payment</title>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: sans-serif;
  background: #08080F;
  color: #fff;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 24px;
  text-align: center;
}
h1 { font-size: 64px; font-weight: 900; color: #F5C518; margin-bottom: 8px; }
p  { font-size: 14px; color: #888; margin-bottom: 40px; letter-spacing: 2px; text-transform: uppercase; }
#status {
  font-size: 13px;
  color: #aaa;
  background: #1a1a2e;
  border: 1px solid #333;
  border-radius: 8px;
  padding: 12px 20px;
  margin-bottom: 24px;
  min-width: 280px;
  min-height: 44px;
  word-break: break-all;
}
button {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 2px;
  padding: 18px 48px;
  background: linear-gradient(135deg, #6922D4, #4A15A0);
  color: #fff;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  box-shadow: 0 4px 24px rgba(105,34,212,0.5);
}
button:disabled { opacity: 0.5; }
.ok  { color: #00C896 !important; border-color: #00C896 !important; }
.err { color: #E8344A !important; border-color: #E8344A !important; }
</style>
</head>
<body>

<h1>P4P</h1>
<p>Fan MMA Rankings · Pi Network</p>

<div id="status">Initialising...</div>
<button id="btn" onclick="pay()" disabled>PAY 1π — VOTE</button>

<script>
var WALLET = 'GBUZ7CAVJOTI5VWSJ3TLKADK2XOXOK6ZZPBZ7T72PBW5WM6PP7R7BX7R';
var ready  = false;
var s      = document.getElementById('status');
var btn    = document.getElementById('btn');

function log(msg, cls) {
  s.textContent = msg;
  s.className   = cls || '';
  console.log('[P4P]', msg);
}

// ── STEP 1: init ──────────────────────────────────────
Pi.init({ version: '2.0', sandbox: true });
log('Pi.init OK — waiting for auth...');

// ── STEP 2: authenticate with BOTH scopes ─────────────
Pi.authenticate(
  ['username', 'payments'],
  function onIncompletePayment(pmt) {
    // incomplete payment from previous session — ignore, do NOT re-create
    console.log('[P4P] incomplete pmt ignored:', pmt);
  }
)
.then(function(auth) {
  ready = true;
  btn.disabled = false;
  log('✓ Auth OK — ' + (auth.user ? auth.user.username : '?') + ' — tap button to pay', 'ok');
})
.catch(function(e) {
  log('Auth error: ' + e, 'err');
});

// ── STEP 3: payment — ONLY triggered by button tap ────
function pay() {
  if (!ready) { log('Not ready yet — wait a moment', 'err'); return; }
  btn.disabled = true;
  log('Opening Pi payment dialog...');

  Pi.createPayment(
    {
      amount:   1,
      memo:     'P4P Fan Vote',
      metadata: { app: 'P4P', ts: Date.now() }
    },
    {
      onReadyForServerApproval: function(paymentId) {
        log('Approving payment: ' + paymentId);
        // production: POST /api/approve { paymentId }
      },
      onReadyForServerCompletion: function(paymentId, txid) {
        log('✓ PAYMENT COMPLETE! txid: ' + txid, 'ok');
        btn.textContent  = '✓ PAID';
        btn.style.background = 'linear-gradient(135deg,#00C896,#007A5E)';
        btn.disabled = false;
      },
      onCancel: function(paymentId) {
        log('Cancelled: ' + paymentId);
        btn.disabled = false;
      },
      onError: function(error, payment) {
        log('Error: ' + JSON.stringify(error), 'err');
        btn.disabled = false;
      }
    }
  );
}
</script>
</body>
</html>
