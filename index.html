    <title>P4P — Fan MMA Rankings</title>
    
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script>
        // Инициализация Pi SDK
        Pi.init({ version: "1.5", sandbox: true });

        async function verifyStep10() {
            try {
                const payment = await Pi.createPayment({
                    amount: 0.1,
                    memo: "Finalizing Step 10 for P4P App",
                    metadata: { orderId: "verification_final" },
                }, {
                    onReadyForServerApproval: (paymentId) => {
                        console.log("Оплата создана, ID:", paymentId);
                    },
                    onReadyForServerCompletion: (paymentId, txid) => {
                        alert("Транзакция прошла успешно! Пункт 10 в чек-листе должен стать зеленым.");
                    },
                    onCancel: (paymentId) => { console.log("Платеж отменен"); },
                    onError: (error, payment) => { console.error("Ошибка SDK:", error); },
                });
            } catch (err) {
                alert("Ошибка: " + err.message);
            }
        }
    </script>
