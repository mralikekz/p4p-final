<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>P4P — Fan MMA Rankings</title>

<!-- Pi Network SDK -->
<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,700;0,900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --gold: #F5C518;
  --pi: #6922D4;
  --bg-root: #08080F;
  --bg-card: #141420;
  --text-h: #FFFFFF;
  --text-body: #C8C8D8;
  --text-muted: #60607A;
  --radius-md: 12px;
}

body {
  background: var(--bg-root);
  color: var(--text-body);
  font-family: 'Barlow', sans-serif;
  padding-bottom: 100px;
}

h1, h2, h3, .font-condensed {
  font-family: 'Barlow Condensed', sans-serif;
  text-transform: uppercase;
}

/* Header */
.app-header {
  background: #0F0F1A;
  padding: 24px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.logo-title {
  font-size: 64px;
  font-weight: 900;
  background: linear-gradient(135deg, var(--gold) 0%, #FFF 50%, var(--gold) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  line-height: 0.9;
}

/* Navigation Tabs */
.app-nav {
  position: sticky;
  top: 0;
  z-index: 50;
  background: rgba(8,8,15,0.9);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(255,255,255,0.05);
  overflow-x: auto;
  white-space: nowrap;
}
.nav-tab {
  padding: 16px 20px;
  background: none;
  border: none;
  color: var(--text-muted);
  font-weight: 700;
  cursor: pointer;
  border-bottom: 3px solid transparent;
}
.nav-tab.active {
  color: var(--gold);
  border-bottom-color: var(--gold);
}

/* Cards */
.p4p-card, .fighter-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px;
  background: var(--bg-card);
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: var(--radius-md);
  margin-bottom: 8px;
}
.rank-num {
  font-size: 24px;
  font-weight: 900;
  min-width: 30px;
  text-align: center;
  color: var(--text-muted);
}
.fighter-info { flex: 1; }
.fighter-name { color: var(--text-h); font-weight: 700; font-size: 17px; }

/* Vote Button */
.btn-vote {
  background: linear-gradient(135deg, var(--pi), #4A15A0);
  border: none;
  border-radius: 8px;
  color: #fff;
  padding: 8px 16px;
  font-weight: 900;
  cursor: pointer;
  transition: transform 0.2s;
}
.btn-vote:active { transform: scale(0.95); }

/* Bottom Navbar */
.bottom-nav {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 100;
  background: rgba(20,20,32,0.9);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px;
  padding: 8px 24px;
  display: flex;
  align-items: center;
  gap: 40px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}
.nav-icon {
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
}
.nav-icon.active-main {
  width: 54px;
  height: 54px;
  background: var(--gold);
  border-radius: 12px;
  color: #000;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 200;
}
.modal-box {
  background: #1A1A28;
  padding: 24px;
  border-radius: 20px;
  width: 90%;
  max-width: 400px;
  text-align: center;
}

.page { display: none; padding: 16px; max-width: 600px; margin: 0 auto; }
.page.active { display: block; }
</style>
</head>
<body>

<header class="app-header">
  <div class="logo-title">P4P</div>
  <div style="font-size: 10px; opacity: 0.5; letter-spacing: 2px;">FAN RANKINGS • PI NETWORK</div>
</header>

<nav class="app-nav" id="navTabs"></nav>

<main id="appMain">
  <div class="page active" id="page-p4p">
    <div id="p4pList"></div>
  </div>
</main>

<!-- Bottom Nav Bar -->
<div class="bottom-nav">
  <!-- Настройки (пустая иконка) -->
  <button class="nav-icon">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
  </button>
  
  <!-- Регистрация (светлая иконка в центре) -->
  <button class="nav-icon active-main">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><line x1="19" y1="8" x2="19" y2="14"></line><line x1="16" y1="11" x2="22" y2="11"></line></svg>
  </button>

  <!-- Статистика / Рейтинг (доп. иконка) -->
  <button class="nav-icon">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
  </button>
</div>

<!-- Modal -->
<div class="modal-overlay" id="voteModal">
  <div class="modal-box">
    <h2 id="mName"></h2>
    <p id="mDiv" style="color: var(--text-muted); font-size: 12px; margin: 10px 0;"></p>
    <div style="background: rgba(105,34,212,0.1); border: 1px solid var(--pi); padding: 16px; border-radius: 12px; margin: 20px 0;">
      <div style="font-size: 32px; font-weight: 900; color: var(--gold);">1 π</div>
      <div style="font-size: 10px; opacity: 0.7;">+100 PTS TO P4P RATING</div>
    </div>
    <button class="btn-vote" style="width: 100%; padding: 16px;" onclick="confirmVote()">ПОДТВЕРДИТЬ</button>
    <button onclick="closeModal()" style="background: none; border: none; color: var(--text-muted); margin-top: 16px; cursor: pointer;">ОТМЕНА</button>
  </div>
</div>

<script>
const FIGHTERS = [
  { name: "Islam Makhachev", flag: "🇷🇺", div: "Lightweight", p4pRank: 1, record: "26-1" },
  { name: "Ilia Topuria", flag: "🇬🇪", div: "Featherweight", p4pRank: 2, record: "15-0" },
  { name: "Alex Pereira", flag: "🇧🇷", div: "Light Heavyweight", p4pRank: 3, record: "10-2" },
  { name: "Jon Jones", flag: "🇺🇸", div: "Heavyweight", p4pRank: 4, record: "27-1" },
  { name: "Petr Yan", flag: "🇷🇺", div: "Bantamweight", p4pRank: 5, record: "17-5" }
];

const WEIGHT_CLASSES = [
  { id: 'lw', label: 'LIGHTWEIGHT', fighters: FIGHTERS.filter(f => f.div === 'Lightweight') },
  { id: 'fw', label: 'FEATHERWEIGHT', fighters: FIGHTERS.filter(f => f.div === 'Featherweight') },
  { id: 'hw', label: 'HEAVYWEIGHT', fighters: FIGHTERS.filter(f => f.div === 'Heavyweight') }
];

let state = { scores: {}, pending: null };

function render() {
  // P4P Leaderboard (sorted by points)
  const p4pList = document.getElementById('p4pList');
  const sortedP4P = [...FIGHTERS].sort((a,b) => (state.scores[b.name] || 0) - (state.scores[a.name] || 0) || a.p4pRank - b.p4pRank);
  
  p4pList.innerHTML = '<h3>P4P RANKING</h3>' + sortedP4P.map((f, i) => `
    <div class="p4p-card">
      <div class="rank-num">${i+1}</div>
      <div class="fighter-info">
        <div class="fighter-name">${f.flag} ${f.name}</div>
        <div style="font-size: 11px; opacity: 0.6;">${f.record} • PTS: ${state.scores[f.name] || 0}</div>
      </div>
      <button class="btn-vote" onclick="openVote('${f.name}', '${f.div}')">1π</button>
    </div>
  `).join('');

  // Weight Classes (sorted by static rank, NOT points)
  WEIGHT_CLASSES.forEach(wc => {
    const page = document.getElementById('page-' + wc.id);
    if (page) {
      page.innerHTML = `<h3>${wc.label}</h3>` + wc.fighters.map((f, i) => `
        <div class="fighter-row">
          <div class="rank-num">${i+1}</div>
          <div class="fighter-info">
            <div class="fighter-name">${f.flag} ${f.name}</div>
            <div style="font-size: 11px; opacity: 0.6;">${f.record}</div>
          </div>
          <button class="btn-vote" onclick="openVote('${f.name}', '${f.div}')">1π</button>
        </div>
      `).join('');
    }
  });
}

function openVote(name, div) {
  state.pending = { name, div };
  document.getElementById('mName').textContent = name;
  document.getElementById('mDiv').textContent = div;
  document.getElementById('voteModal').style.display = 'flex';
}

function confirmVote() {
  const { name } = state.pending;
  state.scores[name] = (state.scores[name] || 0) + 100;
  closeModal();
  render();
  alert("Голос за " + name + " принят! Боец продвинулся в рейтинге P4P.");
}

function closeModal() {
  document.getElementById('voteModal').style.display = 'none';
}

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
}

// Init Navigation
const nav = document.getElementById('navTabs');
nav.innerHTML = `<button class="nav-tab active" onclick="showPage('p4p')">🏆 P4P</button>`;
WEIGHT_CLASSES.forEach(wc => {
  nav.innerHTML += `<button class="nav-tab" onclick="showPage('${wc.id}')">${wc.label}</button>`;
  const div = document.createElement('div');
  div.className = 'page';
  div.id = 'page-' + wc.id;
  document.getElementById('appMain').appendChild(div);
});

render();
</script>
</body>
</html>
